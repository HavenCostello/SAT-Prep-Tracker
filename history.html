<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAT Prep — Study History</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Libre+Baskerville:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --white:     #ffffff;
            --off-white: #f5f5f5;
            --gray:      #d0d0d0;
            --gray-mid:  #9a9a9a;
            --gray-text: #6b6b6b;
            --dark:      #1e1e1e;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scrollbar-width: none; -ms-overflow-style: none; }
        html::-webkit-scrollbar { display: none; }
        img { max-width: 100%; height: auto; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--white);
            color: var(--dark);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Nav ── */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
            padding: 0.875rem max(5vw, 2.5rem);
            border-bottom: 1px solid var(--gray);
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 100;
        }
        .brand {
            font-size: 0.8125rem;
            font-weight: 600;
            letter-spacing: -0.06em;
            color: var(--dark);
            flex-shrink: 0;
            white-space: nowrap;
        }
        .nav-pills {
            display: flex;
            align-items: center;
            background: var(--off-white);
            border-radius: 6.25rem;
            padding: 0.1875rem;
            gap: 0.125rem;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .nav-pills::-webkit-scrollbar { display: none; }
        .nav-pill {
            font-family: 'Inter', sans-serif;
            font-size: 0.8125rem;
            font-weight: 500;
            letter-spacing: -0.03em;
            padding: 0.4375rem 0.9375rem;
            border-radius: 6.25rem;
            color: var(--gray-text);
            text-decoration: none;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
            line-height: 1;
            flex-shrink: 0;
        }
        .nav-pill:hover:not(.active) { background: rgba(30, 30, 30, 0.06); color: var(--dark); }
        .nav-pill.active { background: var(--dark); color: var(--white); }

        /* ── Page ── */
        .page {
            max-width: 56rem;
            margin: 0 auto;
            padding: clamp(3rem, 6vw, 4.5rem) max(5vw, 2.5rem) clamp(4rem, 8vw, 6rem);
        }
        .page-eyebrow {
            font-family: 'Libre Baskerville', serif;
            font-style: italic;
            font-size: 0.875rem;
            color: var(--gray-text);
            margin-bottom: 0.75rem;
        }
        .page-title {
            font-size: clamp(1.75rem, 5vw, 2.5rem);
            font-weight: 500;
            letter-spacing: -0.06em;
            line-height: 1.08;
            color: var(--dark);
            margin-bottom: 3rem;
        }

        /* ── Stat cards ── */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            border-radius: 1.25rem;
            padding: 2.25rem 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 10.25rem;
        }
        .stat-card--dark  { background: var(--dark); color: var(--white); }
        .stat-card--light { background: var(--white); color: var(--dark); border: 1.5px solid var(--dark); }

        .stat-label {
            font-family: 'Libre Baskerville', serif;
            font-style: italic;
            font-size: 0.8125rem;
            margin-bottom: 0.625rem;
        }
        .stat-card--dark  .stat-label { opacity: 0.6; }
        .stat-card--light .stat-label { color: var(--gray-text); }

        .stat-value-row { display: flex; align-items: baseline; gap: 0.375rem; }
        .stat-value {
            font-size: clamp(2.5rem, 5vw, 3.75rem);
            font-weight: 300;
            letter-spacing: -0.06em;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }
        .stat-unit { font-size: 1.0625rem; font-weight: 400; letter-spacing: -0.04em; }
        .stat-card--dark  .stat-unit { opacity: 0.5; }
        .stat-card--light .stat-unit { color: var(--gray-text); }

        .stat-meta { font-size: 0.75rem; font-weight: 500; letter-spacing: -0.01em; margin-top: 0.625rem; }
        .stat-card--dark  .stat-meta { opacity: 0.45; }
        .stat-card--light .stat-meta { color: var(--gray-text); }

        /* ── Filter bar ── */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            font-family: 'Inter', sans-serif;
            font-size: 0.8125rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            padding: 0.5625rem 1.125rem;
            border-radius: 6.25rem;
            border: 1.5px solid var(--gray);
            background: transparent;
            color: var(--gray-text);
            cursor: pointer;
            transition: all 0.15s;
            min-height: 2.75rem;
            display: inline-flex;
            align-items: center;
        }
        .filter-btn:hover { border-color: var(--dark); color: var(--dark); }
        .filter-btn.active { background: var(--dark); border-color: var(--dark); color: var(--white); }

        /* ── Chart ── */
        .chart-section {
            background: var(--off-white);
            border-radius: 1.25rem;
            padding: 1.75rem 2rem 1.25rem;
            margin-bottom: 2rem;
        }
        .chart-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.25rem;
        }
        .chart-title {
            font-size: 0.6875rem;
            font-weight: 500;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: var(--gray-text);
        }
        .chart-peak-label {
            font-family: 'Libre Baskerville', serif;
            font-style: italic;
            font-size: 0.75rem;
            color: var(--gray-text);
        }

        .chart-bars-area {
            height: 8.125rem;
            position: relative;
            margin-bottom: 0;
        }
        .chart-grid {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }
        .chart-grid-line {
            width: 100%;
            height: 1px;
            background: var(--gray);
            opacity: 0.5;
        }
        .chart-grid-line:last-child { opacity: 0; }
        .chart-bars {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: flex-end;
            gap: 3px;
            border-bottom: 1.5px solid var(--gray);
            padding-bottom: 0;
        }
        .bar-item {
            flex: 1;
            height: 100%;
            display: flex;
            align-items: flex-end;
            min-width: 0;
        }
        .bar-inner {
            width: 100%;
            height: 0;
            border-radius: 3px 3px 0 0;
            transition: height 0.45s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            cursor: default;
        }
        .bar-inner.has-data { background: var(--dark); }
        .bar-inner.no-data  { background: var(--gray); opacity: 0.35; border-radius: 2px 2px 0 0; }

        .bar-inner.has-data[data-tip]:hover::after {
            content: attr(data-tip);
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--dark);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 0.6875rem;
            font-weight: 500;
            padding: 0.3125rem 0.625rem;
            border-radius: 0.5rem;
            white-space: nowrap;
            z-index: 100;
            pointer-events: none;
        }

        .chart-x-labels {
            display: flex;
            gap: 3px;
            margin-top: 0.4375rem;
        }
        .bar-lbl {
            flex: 1;
            font-size: 0.625rem;
            font-weight: 500;
            color: var(--gray-text);
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            line-height: 1;
            min-width: 0;
        }
        .chart-empty {
            height: 8.125rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Libre Baskerville', serif;
            font-style: italic;
            font-size: 0.8125rem;
            color: var(--gray-text);
        }

        /* ── Score overlay ── */
        .score-dot {
            position: absolute;
            width: 0.5rem;
            height: 0.5rem;
            background: #4A8C6E;
            border: 2px solid var(--off-white);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            cursor: default;
        }
        .score-dot[data-tip]:hover::after {
            content: attr(data-tip);
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: #4A8C6E;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 0.6875rem;
            font-weight: 500;
            padding: 0.25rem 0.625rem;
            border-radius: 0.5rem;
            white-space: nowrap;
            z-index: 100;
            pointer-events: none;
        }
        .score-legend {
            display: none;
            align-items: center;
            gap: 0.3125rem;
            font-size: 0.6875rem;
            font-weight: 500;
            letter-spacing: -0.01em;
            color: #4A8C6E;
        }
        .score-legend.visible { display: flex; }
        .score-legend-pip {
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 50%;
            background: #4A8C6E;
            flex-shrink: 0;
        }
        .session-score-sub {
            font-size: 0.6875rem;
            font-weight: 600;
            color: #4A8C6E;
            text-align: right;
            margin-top: 0.125rem;
        }

        /* ── Date range picker ── */
        .date-range-bar {
            display: none;
            align-items: center;
            gap: 0.5rem;
            margin-top: -0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .date-range-bar.visible { display: flex; }
        .date-range-input {
            font-family: 'Inter', sans-serif;
            font-size: 0.8125rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            padding: 0.5625rem 1rem;
            border-radius: 6.25rem;
            border: 1.5px solid var(--gray);
            background: transparent;
            color: var(--dark);
            outline: none;
            cursor: pointer;
            transition: border-color 0.15s;
            appearance: none;
            -webkit-appearance: none;
        }
        .date-range-input:focus { border-color: var(--dark); }
        .date-range-sep { font-size: 0.8125rem; color: var(--gray-text); font-weight: 500; }

        /* ── Session list ── */
        .session-list-header {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 1rem;
            padding: 0 0 0.75rem;
            border-bottom: 1px solid var(--gray);
            margin-bottom: 0.25rem;
        }
        .list-col-label {
            font-size: 0.6875rem;
            font-weight: 500;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: var(--gray-text);
        }
        .list-col-label.right { text-align: right; }

        .session-row {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 1rem;
            align-items: center;
            padding: 1.125rem 0;
            border-bottom: 1px solid var(--off-white);
        }
        .session-row:last-child { border-bottom: none; }

        .session-date {
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: -0.03em;
            color: var(--dark);
        }
        .session-time {
            font-family: 'Libre Baskerville', serif;
            font-style: italic;
            font-size: 0.8125rem;
            color: var(--gray-text);
            margin-top: 0.1875rem;
        }
        .session-duration {
            font-size: 0.9375rem;
            font-weight: 500;
            letter-spacing: -0.04em;
            color: var(--dark);
            font-variant-numeric: tabular-nums;
            text-align: right;
            white-space: nowrap;
        }
        .session-duration-sub {
            font-size: 0.6875rem;
            font-weight: 400;
            color: var(--gray-text);
            text-align: right;
            margin-top: 0.125rem;
        }

        .delete-btn {
            width: 1.75rem;
            height: 1.75rem;
            border-radius: 50%;
            border: 1.5px solid var(--gray);
            background: transparent;
            color: var(--gray-mid);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .delete-btn:hover { background: var(--dark); border-color: var(--dark); color: var(--white); }

        /* ── Empty state ── */
        .empty-state { text-align: center; padding: 4.5rem 0; }
        .empty-icon {
            width: 3.25rem; height: 3.25rem; border-radius: 50%;
            border: 2px solid var(--gray);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.25rem;
        }
        .empty-icon svg { opacity: 0.35; }
        .empty-title { font-size: 1.125rem; font-weight: 500; letter-spacing: -0.04em; margin-bottom: 0.5rem; }
        .empty-sub {
            font-family: 'Libre Baskerville', serif;
            font-style: italic; font-size: 0.875rem; color: var(--gray-text); margin-bottom: 1.75rem;
        }
        .btn-go {
            display: inline-flex;
            align-items: center;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem; font-weight: 500; letter-spacing: -0.02em;
            padding: 0.875rem 1.875rem; border-radius: 1rem;
            background: var(--dark); color: var(--white);
            text-decoration: none; transition: opacity 0.15s;
            min-height: 2.75rem;
        }
        .btn-go:hover { opacity: 0.8; }

        /* ── Toast ── */
        .toast {
            position: fixed; bottom: 2.5rem; left: 50%;
            transform: translateX(-50%) translateY(1rem);
            background: var(--dark); color: var(--white);
            font-size: 0.8125rem; font-weight: 500; letter-spacing: -0.02em;
            padding: 0.875rem 1.625rem; border-radius: 6.25rem;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s, transform 0.25s;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── Micro-Mobile (≤320px) ── */
        @media (max-width: 320px) {
            nav { padding: 0.375rem 0.5rem; gap: 0.5rem; }
            .brand { display: none; }
            .nav-pills { padding: 2px; }
            .nav-pill { font-size: 0.625rem; padding: 0.375rem 0.5rem; min-height: 2.75rem; display: inline-flex; align-items: center; }
            .page { padding: 1.5rem 0.5rem 3rem; }
            .page-title { font-size: 1.375rem; margin-bottom: 1.5rem; }
            .stats-grid { grid-template-columns: 1fr; }
            .stat-card { padding: 1.75rem; min-height: auto; }
            .stat-value { font-size: 2.5rem; }
            .chart-section { padding: 1.25rem; }
            .filter-bar { gap: 0.25rem; }
            .filter-btn { font-size: 0.75rem; padding: 0.5rem 0.75rem; }
        }

        /* ── Tablet / iPad Pro (768px–1024px) ── */
        @media (min-width: 768px) and (max-width: 1024px) {
            nav { padding: 0.875rem 3rem; }
            .page { max-width: 48rem; padding: 3rem 3rem 5rem; }
        }

        /* ── Desktop (≥1025px) ── */
        @media (min-width: 1025px) {
            .page { max-width: 56rem; padding: clamp(3rem, 5vw, 4.5rem) max(5vw, 3rem) clamp(4rem, 6vw, 6rem); }
        }
    </style>
</head>
<body>

<nav>
    <span class="brand">SAT Prep</span>
    <div class="nav-pills">
        <a href="home.html"         class="nav-pill">Home</a>
        <a href="index.html"        class="nav-pill">Log Session</a>
        <a href="test.html"         class="nav-pill">Practice Tests</a>
        <a href="test-history.html" class="nav-pill">Test History</a>
        <a href="history.html"      class="nav-pill active">Study History</a>
        <a href="sync.html"         class="nav-pill">Sync</a>
    </div>
</nav>

<div class="page">
    <p class="page-eyebrow">SAT Prep</p>
    <h1 class="page-title">Study History</h1>

    <!-- Stat cards -->
    <div class="stats-grid">
        <div class="stat-card stat-card--dark">
            <div>
                <p class="stat-label">Total time studied</p>
                <div class="stat-value-row">
                    <span class="stat-value" id="totalValue">0</span>
                    <span class="stat-unit"  id="totalUnit">min</span>
                </div>
            </div>
            <p class="stat-meta" id="totalSessionsCount">— sessions</p>
        </div>
        <div class="stat-card stat-card--light">
            <div>
                <p class="stat-label">Longest session</p>
                <div class="stat-value-row">
                    <span class="stat-value" id="longestValue">—</span>
                    <span class="stat-unit"  id="longestUnit"></span>
                </div>
            </div>
            <p class="stat-meta" id="longestDate"></p>
        </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
        <button class="filter-btn active" data-filter="all"    onclick="setFilter('all')">All time</button>
        <button class="filter-btn"        data-filter="month"  onclick="setFilter('month')">This month</button>
        <button class="filter-btn"        data-filter="week"   onclick="setFilter('week')">This week</button>
        <button class="filter-btn"        data-filter="day"    onclick="setFilter('day')">Today</button>
        <button class="filter-btn"        data-filter="custom" onclick="setFilter('custom')">Custom</button>
    </div>
    <div class="date-range-bar" id="dateRangeBar">
        <input type="date" class="date-range-input" id="dateFrom" onchange="applyCustomRange()">
        <span class="date-range-sep">→</span>
        <input type="date" class="date-range-input" id="dateTo" onchange="applyCustomRange()">
    </div>

    <!-- Bar chart -->
    <div class="chart-section">
        <div class="chart-header">
            <span class="chart-title" id="chartTitle">Monthly overview</span>
            <div style="display:flex;align-items:center;gap:0.875rem;">
                <span class="score-legend" id="scoreLegend"><span class="score-legend-pip"></span>Score</span>
                <span class="chart-peak-label" id="chartPeak"></span>
            </div>
        </div>
        <div id="chartContent">
            <div class="chart-empty">No sessions logged yet</div>
        </div>
    </div>

    <!-- Session list -->
    <div id="sessionList"></div>
</div>

<div class="toast" id="toast"></div>

<script src="storage.js"></script>
<script>
    let currentFilter = 'all';
    let customFrom = null, customTo = null;

    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

    function filterSessions(sessions, filter) {
        const now   = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        if (filter === 'day') {
            return sessions.filter(s => new Date(s.date) >= today);
        }
        if (filter === 'week') {
            const dow       = today.getDay();
            const weekStart = new Date(today);
            weekStart.setDate(today.getDate() - ((dow + 6) % 7));
            return sessions.filter(s => new Date(s.date) >= weekStart);
        }
        if (filter === 'month') {
            const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
            return sessions.filter(s => new Date(s.date) >= monthStart);
        }
        if (filter === 'custom') {
            return sessions.filter(s => {
                const d = new Date(s.date);
                if (customFrom && d < customFrom) return false;
                if (customTo   && d > customTo)   return false;
                return true;
            });
        }
        return sessions;
    }

    function applyCustomRange() {
        const fv = document.getElementById('dateFrom').value;
        const tv = document.getElementById('dateTo').value;
        customFrom = fv ? new Date(fv + 'T00:00:00') : null;
        customTo   = tv ? new Date(tv + 'T23:59:59') : null;
        render();
    }

    function fmtTotalTime(secs) {
        const h = Math.floor(secs / 3600);
        const m = Math.floor((secs % 3600) / 60);
        if (h >= 1) {
            const unit = m > 0 ? `hr ${m} min` : 'hr';
            return { value: String(h), unit };
        }
        return { value: String(m || 0), unit: 'min' };
    }

    function fmtDuration(secs) {
        const h = Math.floor(secs / 3600);
        const m = Math.floor((secs % 3600) / 60);
        const s = secs % 60;
        if (h > 0 && m > 0) return `${h} hr ${m} min`;
        if (h > 0)           return `${h} hr`;
        if (m > 0 && s > 0)  return `${m} min ${s} sec`;
        if (m > 0)           return `${m} min`;
        return `${s} sec`;
    }

    function fmtDurationShort(secs) {
        const h = Math.floor(secs / 3600);
        const m = Math.floor((secs % 3600) / 60);
        const s = secs % 60;
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function fmtDate(isoStr) {
        const d   = new Date(isoStr);
        const now = new Date();
        const yr  = d.getFullYear() !== now.getFullYear() ? `, ${d.getFullYear()}` : '';
        const h   = d.getHours(), min = String(d.getMinutes()).padStart(2,'0');
        const ampm = h >= 12 ? 'PM' : 'AM';
        return {
            date: `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}${yr}`,
            time: `${(h % 12) || 12}:${min} ${ampm}`
        };
    }

    function buildChartData(allSessions, filter) {
        const now = new Date();

        if (filter === 'all') {
            if (allSessions.length === 0)
                return { bars: [], title: 'Monthly overview', peak: null };

            const map = {}, scoreMap = {}, scoreCnt = {};
            allSessions.forEach(s => {
                const d   = new Date(s.date);
                const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
                map[key]  = (map[key] || 0) + s.duration;
                if (s.score != null) {
                    scoreMap[key] = (scoreMap[key] || 0) + s.score;
                    scoreCnt[key] = (scoreCnt[key] || 0) + 1;
                }
            });

            const earliest = Object.keys(map).sort()[0];
            const start    = new Date(earliest + '-01');
            const bars = [];
            const cur  = new Date(start.getFullYear(), start.getMonth(), 1);
            const end  = new Date(now.getFullYear(), now.getMonth(), 1);

            while (cur <= end) {
                const key = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}`;
                const yr  = String(cur.getFullYear()).slice(2);
                bars.push({
                    label: `${MONTHS[cur.getMonth()]} '${yr}`,
                    short: MONTHS[cur.getMonth()],
                    value: map[key] || 0,
                    score: scoreCnt[key] ? +(scoreMap[key] / scoreCnt[key]).toFixed(1) : null
                });
                cur.setMonth(cur.getMonth() + 1);
            }

            const slice   = bars.slice(-24);
            const maxVal  = Math.max(...slice.map(b => b.value));
            const peakBar = slice.find(b => b.value === maxVal);
            return { bars: slice, title: 'Monthly overview', peak: peakBar && maxVal > 0 ? peakBar : null };
        }

        if (filter === 'month') {
            const yr  = now.getFullYear(), mo = now.getMonth();
            const dim = new Date(yr, mo + 1, 0).getDate();
            const map = {}, scoreMap = {}, scoreCnt = {};
            allSessions.forEach(s => {
                const d = new Date(s.date);
                if (d.getFullYear() === yr && d.getMonth() === mo) {
                    map[d.getDate()] = (map[d.getDate()] || 0) + s.duration;
                    if (s.score != null) {
                        scoreMap[d.getDate()] = (scoreMap[d.getDate()] || 0) + s.score;
                        scoreCnt[d.getDate()] = (scoreCnt[d.getDate()] || 0) + 1;
                    }
                }
            });
            const bars = [];
            for (let i = 1; i <= dim; i++)
                bars.push({ label: String(i), value: map[i] || 0, score: scoreCnt[i] ? +(scoreMap[i] / scoreCnt[i]).toFixed(1) : null });

            const maxVal  = Math.max(...bars.map(b => b.value));
            const peakBar = bars.find(b => b.value === maxVal);
            return {
                bars,
                title: `${MONTHS_FULL[mo]} · day by day`,
                peak: peakBar && maxVal > 0 ? { label: `${MONTHS[mo]} ${peakBar.label}`, value: maxVal } : null
            };
        }

        if (filter === 'week') {
            const dow    = now.getDay();
            const monday = new Date(now);
            monday.setDate(now.getDate() - ((dow + 6) % 7));
            monday.setHours(0,0,0,0);

            const DAY_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
            const bars = DAY_SHORT.map((label, i) => {
                const d = new Date(monday);
                d.setDate(monday.getDate() + i);
                return { label, date: d, value: 0, score: null };
            });
            const scoreMap = {}, scoreCnt = {};

            allSessions.forEach(s => {
                const d = new Date(s.date);
                if (d >= monday) {
                    const idx = (d.getDay() + 6) % 7;
                    bars[idx].value += s.duration;
                    if (s.score != null) {
                        scoreMap[idx] = (scoreMap[idx] || 0) + s.score;
                        scoreCnt[idx] = (scoreCnt[idx] || 0) + 1;
                    }
                }
            });
            bars.forEach((b, i) => { b.score = scoreCnt[i] ? +(scoreMap[i] / scoreCnt[i]).toFixed(1) : null; });

            const sunday  = new Date(monday); sunday.setDate(monday.getDate() + 6);
            const range   = `${MONTHS[monday.getMonth()]} ${monday.getDate()} – ${sunday.getDate()}`;
            const maxVal  = Math.max(...bars.map(b => b.value));
            const peakBar = bars.find(b => b.value === maxVal);
            return { bars, title: `This week · ${range}`, peak: peakBar && maxVal > 0 ? peakBar : null };
        }

        if (filter === 'day') {
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const map = {}, scoreMap = {}, scoreCnt = {};
            allSessions.forEach(s => {
                const d = new Date(s.date);
                if (d >= today) {
                    map[d.getHours()] = (map[d.getHours()] || 0) + s.duration;
                    if (s.score != null) {
                        scoreMap[d.getHours()] = (scoreMap[d.getHours()] || 0) + s.score;
                        scoreCnt[d.getHours()] = (scoreCnt[d.getHours()] || 0) + 1;
                    }
                }
            });

            const todayLabel = `${MONTHS_FULL[now.getMonth()]} ${now.getDate()}`;
            if (Object.keys(map).length === 0)
                return { bars: [], title: `Today · ${todayLabel}`, peak: null };

            const hours = Object.keys(map).map(Number).sort((a,b) => a-b);
            const bars  = hours.map(h => {
                const ampm = h >= 12 ? 'PM' : 'AM';
                return { label: `${(h % 12) || 12}${ampm}`, value: map[h], score: scoreCnt[h] ? +(scoreMap[h] / scoreCnt[h]).toFixed(1) : null };
            });
            const maxVal  = Math.max(...bars.map(b => b.value));
            const peakBar = bars.find(b => b.value === maxVal);
            return { bars, title: `Today · ${todayLabel}`, peak: peakBar && maxVal > 0 ? peakBar : null };
        }

        if (filter === 'custom') {
            if (!customFrom && !customTo)
                return { bars: [], title: 'Custom range', peak: null };

            const from = customFrom || new Date(0);
            const to   = customTo   || new Date(8640000000000000);

            const fromDay = new Date(from.getFullYear(), from.getMonth(), from.getDate());
            const toDay   = customTo
                ? new Date(to.getFullYear(), to.getMonth(), to.getDate())
                : null;

            const isSingleDay = toDay && fromDay.getTime() === toDay.getTime();

            const inRange = allSessions.filter(s => {
                const d = new Date(s.date);
                return d >= from && d <= to;
            });

            const fmtShort = d => `${MONTHS[d.getMonth()]} ${d.getDate()}`;
            const rangeTitle = isSingleDay
                ? `${MONTHS_FULL[fromDay.getMonth()]} ${fromDay.getDate()}`
                : customFrom && customTo
                    ? `Custom · ${fmtShort(fromDay)} – ${fmtShort(toDay)}`
                    : customFrom
                        ? `Custom · from ${fmtShort(fromDay)}`
                        : `Custom · to ${fmtShort(toDay)}`;

            if (isSingleDay) {
                const map = {}, scoreMap = {}, scoreCnt = {};
                inRange.forEach(s => {
                    const h = new Date(s.date).getHours();
                    map[h] = (map[h] || 0) + s.duration;
                    if (s.score != null) {
                        scoreMap[h] = (scoreMap[h] || 0) + s.score;
                        scoreCnt[h] = (scoreCnt[h] || 0) + 1;
                    }
                });

                if (Object.keys(map).length === 0)
                    return { bars: [], title: rangeTitle, peak: null };

                const hours = Object.keys(map).map(Number).sort((a, b) => a - b);
                const bars  = hours.map(h => ({
                    label: `${(h % 12) || 12}${h >= 12 ? 'PM' : 'AM'}`,
                    value: map[h],
                    score: scoreCnt[h] ? +(scoreMap[h] / scoreCnt[h]).toFixed(1) : null
                }));
                const maxVal  = Math.max(...bars.map(b => b.value));
                const peakBar = bars.find(b => b.value === maxVal);
                return { bars, title: rangeTitle, peak: peakBar && maxVal > 0 ? peakBar : null };
            }

            if (inRange.length === 0)
                return { bars: [], title: rangeTitle, peak: null };

            const map = {}, scoreMap = {}, scoreCnt = {};
            inRange.forEach(s => {
                const d   = new Date(s.date);
                const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                map[key]  = (map[key] || 0) + s.duration;
                if (s.score != null) {
                    scoreMap[key] = (scoreMap[key] || 0) + s.score;
                    scoreCnt[key] = (scoreCnt[key] || 0) + 1;
                }
            });

            const endDay = toDay
                ? toDay
                : (() => { const d = new Date(Math.max(...inRange.map(s => new Date(s.date)))); return new Date(d.getFullYear(), d.getMonth(), d.getDate()); })();

            const bars = [];
            const cur  = new Date(fromDay);
            while (cur <= endDay) {
                const key = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`;
                bars.push({
                    label: `${MONTHS[cur.getMonth()]} ${cur.getDate()}`,
                    short: String(cur.getDate()),
                    value: map[key] || 0,
                    score: scoreCnt[key] ? +(scoreMap[key] / scoreCnt[key]).toFixed(1) : null
                });
                cur.setDate(cur.getDate() + 1);
            }

            const maxVal  = Math.max(...bars.map(b => b.value));
            const peakBar = bars.find(b => b.value === maxVal);
            return { bars, title: rangeTitle, peak: peakBar && maxVal > 0 ? peakBar : null };
        }

        return { bars: [], title: '', peak: null };
    }

    function buildScoreOverlayHTML(bars) {
        const total = bars.length;
        const pts = bars.map((b, i) => b.score != null ? {
            x: +((i + 0.5) / total * 100).toFixed(2),
            y: +((1 - b.score / 10) * 90 + 5).toFixed(2),
            score: b.score, label: b.label
        } : null).filter(Boolean);
        if (pts.length === 0) return '';
        const line = pts.length > 1
            ? `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:2;"><polyline points="${pts.map(p => `${p.x},${p.y}`).join(' ')}" fill="none" stroke="#4A8C6E" stroke-width="1.5" stroke-linejoin="round" vector-effect="non-scaling-stroke"/></svg>`
            : '';
        const dots = pts.map(p =>
            `<div class="score-dot" style="left:${p.x}%;top:${p.y}%;" data-tip="${p.score}/10 · ${p.label}"></div>`
        ).join('');
        return line + dots;
    }

    function shouldShowLabel(idx, total) {
        if (total <= 8)  return true;
        if (total <= 14) return idx % 2 === 0;
        if (total <= 21) return idx % 3 === 0 || idx === total - 1;
        return idx % 5 === 0 || idx === total - 1;
    }

    function renderChart(allSessions, filter) {
        const { bars, title, peak } = buildChartData(allSessions, filter);

        document.getElementById('chartTitle').textContent = title;
        document.getElementById('chartPeak').textContent  =
            peak ? `Peak: ${fmtDuration(peak.value)}` : '';

        const content = document.getElementById('chartContent');

        if (bars.length === 0) {
            content.innerHTML = '<div class="chart-empty">No sessions logged for this period</div>';
            return;
        }

        const maxVal   = Math.max(...bars.map(b => b.value), 1);
        const barsHTML = bars.map((b, i) => {
            const pct     = (b.value / maxVal) * 100;
            const hasData = b.value > 0;
            const cls     = hasData ? 'has-data' : 'no-data';
            const tip     = hasData ? `data-tip="${b.label}: ${fmtDuration(b.value)}"` : '';
            const minH    = hasData ? 'style="height:0"' : 'style="height:3px"';
            return `<div class="bar-item"><div class="bar-inner ${cls}" data-h="${pct.toFixed(1)}" ${minH} ${tip}></div></div>`;
        }).join('');

        const labelsHTML = bars.map((b, i) =>
            `<div class="bar-lbl">${shouldShowLabel(i, bars.length) ? (b.short || b.label) : ''}</div>`
        ).join('');

        const scoreOverlay = buildScoreOverlayHTML(bars);
        document.getElementById('scoreLegend').classList.toggle('visible', bars.some(b => b.score != null));

        content.innerHTML = `
            <div class="chart-bars-area">
                <div class="chart-grid">
                    <div class="chart-grid-line"></div>
                    <div class="chart-grid-line"></div>
                    <div class="chart-grid-line"></div>
                    <div class="chart-grid-line"></div>
                </div>
                <div class="chart-bars" id="chartBarsRow">${barsHTML}</div>
                ${scoreOverlay}
            </div>
            <div class="chart-x-labels">${labelsHTML}</div>`;

        requestAnimationFrame(() => requestAnimationFrame(() => {
            content.querySelectorAll('.bar-inner[data-h]').forEach(el => {
                el.style.height = el.getAttribute('data-h') + '%';
            });
        }));
    }

    async function render() {
        const all      = (await SAT_STORAGE.getSessions()).sort((a, b) => new Date(b.date) - new Date(a.date));
        const filtered = filterSessions(all, currentFilter);
        const totalSec = filtered.reduce((acc, s) => acc + s.duration, 0);

        const { value, unit } = fmtTotalTime(totalSec);
        document.getElementById('totalValue').textContent = value;
        document.getElementById('totalUnit').textContent  = unit;
        document.getElementById('totalSessionsCount').textContent =
            filtered.length === 1 ? '1 session' : `${filtered.length} sessions`;

        if (filtered.length > 0) {
            const longest = filtered.reduce((b, s) => s.duration > b.duration ? s : b);
            const { value: lv, unit: lu } = fmtTotalTime(longest.duration);
            document.getElementById('longestValue').textContent = lv;
            document.getElementById('longestUnit').textContent  = lu;
            document.getElementById('longestDate').textContent  = fmtDate(longest.date).date;
        } else {
            document.getElementById('longestValue').textContent = '—';
            document.getElementById('longestUnit').textContent  = '';
            document.getElementById('longestDate').textContent  = '';
        }

        renderChart(all, currentFilter);

        const listEl = document.getElementById('sessionList');
        if (filtered.length === 0) {
            const msg = currentFilter === 'day'    ? 'No sessions logged today'
                      : currentFilter === 'week'   ? 'No sessions this week'
                      : currentFilter === 'month'  ? 'No sessions this month'
                      : currentFilter === 'custom' ? 'No sessions in this date range'
                      : 'No sessions yet';
            listEl.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                        </svg>
                    </div>
                    <p class="empty-title">${msg}</p>
                    <p class="empty-sub">Head back to log a session.</p>
                    <a href="index.html" class="btn-go">Log a session</a>
                </div>`;
            return;
        }

        let html = `
            <div class="session-list-header">
                <span class="list-col-label">Date</span>
                <span class="list-col-label right">Duration</span>
                <span></span>
            </div>`;

        filtered.forEach(s => {
            const { date, time } = fmtDate(s.date);
            html += `
                <div class="session-row" id="row-${s.id}">
                    <div>
                        <div class="session-date">${date}</div>
                        <div class="session-time">Started at ${time}</div>
                    </div>
                    <div>
                        <div class="session-duration">${fmtDuration(s.duration)}</div>
                        <div class="session-duration-sub">${fmtDurationShort(s.duration)}</div>
                        ${s.score != null ? `<div class="session-score-sub">${s.score}/10</div>` : ''}
                    </div>
                    <button class="delete-btn" onclick="deleteSession('${s.id}')" title="Delete">
                        <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                            <line x1="1" y1="1" x2="11" y2="11"/><line x1="11" y1="1" x2="1" y2="11"/>
                        </svg>
                    </button>
                </div>`;
        });

        listEl.innerHTML = html;
    }

    function setFilter(f) {
        currentFilter = f;
        document.querySelectorAll('.filter-btn').forEach(btn =>
            btn.classList.toggle('active', btn.dataset.filter === f));
        document.getElementById('dateRangeBar').classList.toggle('visible', f === 'custom');
        render();
    }

    async function deleteSession(id) {
        if (!confirm('Remove this session from your history?')) return;
        const sessions = (await SAT_STORAGE.getSessions()).filter(s => s.id !== id);
        await SAT_STORAGE.saveSessions(sessions);
        render();
        showToast('Session removed');
    }

    let toastTimer = null;
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    document.addEventListener('DOMContentLoaded', () => render());
</script>
</body>
</html>
