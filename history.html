                <p class="stat-label">Total time studied</p>

            </div>
            <p class="stat-meta" id="totalSessionsCount">— sessions</p>
        </div>
        <div class="stat-card stat-card--light">
            <div>
                <p class="stat-label">Longest session</p>
                <div class="stat-value-row">
                    <span class="stat-value" id="longestValue">—</span>
                    <span class="stat-unit"  id="longestUnit"></span>
                </div>
            </div>
            <p class="stat-meta" id="longestDate"></p>
        </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
        <button class="filter-btn active" data-filter="all"    onclick="setFilter('all')">All time</button>
        <button class="filter-btn"        data-filter="month"  onclick="setFilter('month')">This month</button>
        <button class="filter-btn"        data-filter="week"   onclick="setFilter('week')">This week</button>
        <button class="filter-btn"        data-filter="day"    onclick="setFilter('day')">Today</button>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<script>
    let currentFilter = 'all';
    let customFrom = null, customTo = null;

    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

    function filterSessions(sessions, filter) {
        const now   = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        if (filter === 'day') {
            return sessions.filter(s => new Date(s.date) >= today);
        }
        if (filter === 'week') {
            const dow       = today.getDay();
            const weekStart = new Date(today);
            weekStart.setDate(today.getDate() - ((dow + 6) % 7));
            return sessions.filter(s => new Date(s.date) >= weekStart);
        }
        if (filter === 'month') {
            const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
            return sessions.filter(s => new Date(s.date) >= monthStart);
        }
        if (filter === 'custom') {
            return sessions.filter(s => {
                const d = new Date(s.date);
                if (customFrom && d < customFrom) return false;
                if (customTo   && d > customTo)   return false;
                return true;
            });
        }
        return sessions;
    }

    function applyCustomRange() {
        const fv = document.getElementById('dateFrom').value;
        const tv = document.getElementById('dateTo').value;
        customFrom = fv ? new Date(fv + 'T00:00:00') : null;
        customTo   = tv ? new Date(tv + 'T23:59:59') : null;
        render();
    }

    function fmtTotalTime(secs) {
        const h = Math.floor(secs / 3600);
        const m = Math.floor((secs % 3600) / 60);
        if (h >= 1) {
            const unit = m > 0 ? `hr ${m} min` : 'hr';
            return { value: String(h), unit };
        }
        return { value: String(m || 0), unit: 'min' };
    }

    function fmtDuration(secs) {
        const h = Math.floor(secs / 3600);
        const m = Math.floor((secs % 3600) / 60);
        const s = secs % 60;
        if (h > 0 && m > 0) return `${h} hr ${m} min`;
        if (h > 0)           return `${h} hr`;
        if (m > 0 && s > 0)  return `${m} min ${s} sec`;
        if (m > 0)           return `${m} min`;
        return `${s} sec`;
    }

    function fmtDurationShort(secs) {
        const h = Math.floor(secs / 3600);
        const m = Math.floor((secs % 3600) / 60);
        const s = secs % 60;
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function fmtDate(isoStr) {
        const d   = new Date(isoStr);
        const now = new Date();
        const yr  = d.getFullYear() !== now.getFullYear() ? `, ${d.getFullYear()}` : '';
        const h   = d.getHours(), min = String(d.getMinutes()).padStart(2,'0');
        const ampm = h >= 12 ? 'PM' : 'AM';
        return {
            date: `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}${yr}`,
            time: `${(h % 12) || 12}:${min} ${ampm}`
        };
    }

    function buildChartData(allSessions, filter) {
        const now = new Date();

        if (filter === 'all') {
            if (allSessions.length === 0)
                return { bars: [], title: 'Monthly overview', peak: null };

            const map = {}, scoreMap = {}, scoreCnt = {};
            allSessions.forEach(s => {
                const d   = new Date(s.date);
                const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
                map[key]  = (map[key] || 0) + s.duration;
                if (s.score != null) {
                    scoreMap[key] = (scoreMap[key] || 0) + s.score;
                    scoreCnt[key] = (scoreCnt[key] || 0) + 1;
                }
            });

            const earliest = Object.keys(map).sort()[0];
            const start    = new Date(earliest + '-01');
            const bars = [];
            const cur  = new Date(start.getFullYear(), start.getMonth(), 1);
            const end  = new Date(now.getFullYear(), now.getMonth(), 1);

            while (cur <= end) {
                const key = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}`;
                const yr  = String(cur.getFullYear()).slice(2);
                bars.push({
                    label: `${MONTHS[cur.getMonth()]} '${yr}`,
                    short: MONTHS[cur.getMonth()],
                    value: map[key] || 0,
                    score: scoreCnt[key] ? +(scoreMap[key] / scoreCnt[key]).toFixed(1) : null
                });
                cur.setMonth(cur.getMonth() + 1);
            }

            const slice   = bars.slice(-24);
            const maxVal  = Math.max(...slice.map(b => b.value));
            const peakBar = slice.find(b => b.value === maxVal);
            return { bars: slice, title: 'Monthly overview', peak: peakBar && maxVal > 0 ? peakBar : null };
        }

        if (filter === 'month') {
            const yr  = now.getFullYear(), mo = now.getMonth();
            const dim = new Date(yr, mo + 1, 0).getDate();
            const map = {}, scoreMap = {}, scoreCnt = {};
            allSessions.forEach(s => {
                const d = new Date(s.date);
                if (d.getFullYear() === yr && d.getMonth() === mo) {
                    map[d.getDate()] = (map[d.getDate()] || 0) + s.duration;
                    if (s.score != null) {
                        scoreMap[d.getDate()] = (scoreMap[d.getDate()] || 0) + s.score;
                        scoreCnt[d.getDate()] = (scoreCnt[d.getDate()] || 0) + 1;
                    }
                }
            });
            const bars = [];
            for (let i = 1; i <= dim; i++)
                bars.push({ label: String(i), value: map[i] || 0, score: scoreCnt[i] ? +(scoreMap[i] / scoreCnt[i]).toFixed(1) : null });

            const maxVal  = Math.max(...bars.map(b => b.value));
            const peakBar = bars.find(b => b.value === maxVal);
            return {
                bars,
                title: `${MONTHS_FULL[mo]} · day by day`,
                peak: peakBar && maxVal > 0 ? { label: `${MONTHS[mo]} ${peakBar.label}`, value: maxVal } : null
            };
        }

        if (filter === 'week') {
            const dow    = now.getDay();
            const monday = new Date(now);
            monday.setDate(now.getDate() - ((dow + 6) % 7));
            monday.setHours(0,0,0,0);

            const DAY_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
            const bars = DAY_SHORT.map((label, i) => {
                const d = new Date(monday);
                d.setDate(monday.getDate() + i);
                return { label, date: d, value: 0, score: null };
            });
            const scoreMap = {}, scoreCnt = {};

            allSessions.forEach(s => {
                const d = new Date(s.date);
                if (d >= monday) {
                    const idx = (d.getDay() + 6) % 7;
                    bars[idx].value += s.duration;
                    if (s.score != null) {
                        scoreMap[idx] = (scoreMap[idx] || 0) + s.score;
                        scoreCnt[idx] = (scoreCnt[idx] || 0) + 1;
                    }
                }
            });
            bars.forEach((b, i) => { b.score = scoreCnt[i] ? +(scoreMap[i] / scoreCnt[i]).toFixed(1) : null; });

            const sunday  = new Date(monday); sunday.setDate(monday.getDate() + 6);
            const range   = `${MONTHS[monday.getMonth()]} ${monday.getDate()} – ${sunday.getDate()}`;
            const maxVal  = Math.max(...bars.map(b => b.value));
            const peakBar = bars.find(b => b.value === maxVal);
            return { bars, title: `This week · ${range}`, peak: peakBar && maxVal > 0 ? peakBar : null };
        }

        if (filter === 'day') {
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const map = {}, scoreMap = {}, scoreCnt = {};
            allSessions.forEach(s => {
                const d = new Date(s.date);
                if (d >= today) {
                    map[d.getHours()] = (map[d.getHours()] || 0) + s.duration;
                    if (s.score != null) {
                        scoreMap[d.getHours()] = (scoreMap[d.getHours()] || 0) + s.score;
                        scoreCnt[d.getHours()] = (scoreCnt[d.getHours()] || 0) + 1;
                    }
                }
            });

            const todayLabel = `${MONTHS_FULL[now.getMonth()]} ${now.getDate()}`;
            if (Object.keys(map).length === 0)
                return { bars: [], title: `Today · ${todayLabel}`, peak: null };

            const hours = Object.keys(map).map(Number).sort((a,b) => a-b);
            const bars  = hours.map(h => {
                const ampm = h >= 12 ? 'PM' : 'AM';
                return { label: `${(h % 12) || 12}${ampm}`, value: map[h], score: scoreCnt[h] ? +(scoreMap[h] / scoreCnt[h]).toFixed(1) : null };
            });
            const maxVal  = Math.max(...bars.map(b => b.value));
            const peakBar = bars.find(b => b.value === maxVal);
            return { bars, title: `Today · ${todayLabel}`, peak: peakBar && maxVal > 0 ? peakBar : null };
        }

        if (filter === 'custom') {
            if (!customFrom && !customTo)
                return { bars: [], title: 'Custom range', peak: null };

            const from = customFrom || new Date(0);
            const to   = customTo   || new Date(8640000000000000);

            const fromDay = new Date(from.getFullYear(), from.getMonth(), from.getDate());
            const toDay   = customTo
                ? new Date(to.getFullYear(), to.getMonth(), to.getDate())
                : null;

            const isSingleDay = toDay && fromDay.getTime() === toDay.getTime();

            const inRange = allSessions.filter(s => {
                const d = new Date(s.date);
                return d >= from && d <= to;
            });

            const fmtShort = d => `${MONTHS[d.getMonth()]} ${d.getDate()}`;
            const rangeTitle = isSingleDay
                ? `${MONTHS_FULL[fromDay.getMonth()]} ${fromDay.getDate()}`
                : customFrom && customTo
                    ? `Custom · ${fmtShort(fromDay)} – ${fmtShort(toDay)}`
                    : customFrom
                        ? `Custom · from ${fmtShort(fromDay)}`
                        : `Custom · to ${fmtShort(toDay)}`;

            if (isSingleDay) {
                const map = {}, scoreMap = {}, scoreCnt = {};
                inRange.forEach(s => {
                    const h = new Date(s.date).getHours();
                    map[h] = (map[h] || 0) + s.duration;
                    if (s.score != null) {
                        scoreMap[h] = (scoreMap[h] || 0) + s.score;
                        scoreCnt[h] = (scoreCnt[h] || 0) + 1;
                    }
                });

                if (Object.keys(map).length === 0)
                    return { bars: [], title: rangeTitle, peak: null };

                const hours = Object.keys(map).map(Number).sort((a, b) => a - b);
                const bars  = hours.map(h => ({
                    label: `${(h % 12) || 12}${h >= 12 ? 'PM' : 'AM'}`,
                    value: map[h],
                    score: scoreCnt[h] ? +(scoreMap[h] / scoreCnt[h]).toFixed(1) : null
                }));
                const maxVal  = Math.max(...bars.map(b => b.value));
                const peakBar = bars.find(b => b.value === maxVal);
                return { bars, title: rangeTitle, peak: peakBar && maxVal > 0 ? peakBar : null };
            }

            if (inRange.length === 0)
                return { bars: [], title: rangeTitle, peak: null };

            const map = {}, scoreMap = {}, scoreCnt = {};
            inRange.forEach(s => {
                const d   = new Date(s.date);
                const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                map[key]  = (map[key] || 0) + s.duration;
                if (s.score != null) {
                    scoreMap[key] = (scoreMap[key] || 0) + s.score;
                    scoreCnt[key] = (scoreCnt[key] || 0) + 1;
                }
            });

            const endDay = toDay
                ? toDay
                : (() => { const d = new Date(Math.max(...inRange.map(s => new Date(s.date)))); return new Date(d.getFullYear(), d.getMonth(), d.getDate()); })();

            const bars = [];
            const cur  = new Date(fromDay);
            while (cur <= endDay) {
                const key = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`;
                bars.push({
                    label: `${MONTHS[cur.getMonth()]} ${cur.getDate()}`,
                    short: String(cur.getDate()),
                    value: map[key] || 0,
                    score: scoreCnt[key] ? +(scoreMap[key] / scoreCnt[key]).toFixed(1) : null
                });
                cur.setDate(cur.getDate() + 1);
            }

            const maxVal  = Math.max(...bars.map(b => b.value));
            const peakBar = bars.find(b => b.value === maxVal);
            return { bars, title: rangeTitle, peak: peakBar && maxVal > 0 ? peakBar : null };
        }

        return { bars: [], title: '', peak: null };
    }

    function buildScoreOverlayHTML(bars) {
        const total = bars.length;
        const pts = bars.map((b, i) => b.score != null ? {
            x: +((i + 0.5) / total * 100).toFixed(2),
            y: +((1 - b.score / 10) * 90 + 5).toFixed(2),
            score: b.score, label: b.label
        } : null).filter(Boolean);
        if (pts.length === 0) return '';
        const line = pts.length > 1
            ? `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:2;"><polyline points="${pts.map(p => `${p.x},${p.y}`).join(' ')}" fill="none" stroke="#4A8C6E" stroke-width="1.5" stroke-linejoin="round" vector-effect="non-scaling-stroke"/></svg>`
            : '';
        const dots = pts.map(p =>
            `<div class="score-dot" style="left:${p.x}%;top:${p.y}%;" data-tip="${p.score}/10 · ${p.label}"></div>`
        ).join('');
        return line + dots;
    }

    function shouldShowLabel(idx, total) {
        if (total <= 8)  return true;
        if (total <= 14) return idx % 2 === 0;
        if (total <= 21) return idx % 3 === 0 || idx === total - 1;
        return idx % 5 === 0 || idx === total - 1;
    }

    function renderChart(allSessions, filter) {
        const { bars, title, peak } = buildChartData(allSessions, filter);

        document.getElementById('chartTitle').textContent = title;
        document.getElementById('chartPeak').textContent  =
            peak ? `Peak: ${fmtDuration(peak.value)}` : '';

        const content = document.getElementById('chartContent');

        if (bars.length === 0) {
            content.innerHTML = '<div class="chart-empty">No sessions logged for this period</div>';
            return;
        }

        const maxVal   = Math.max(...bars.map(b => b.value), 1);
        const barsHTML = bars.map((b, i) => {
            const pct     = (b.value / maxVal) * 100;
            const hasData = b.value > 0;
            const cls     = hasData ? 'has-data' : 'no-data';
            const tip     = hasData ? `data-tip="${b.label}: ${fmtDuration(b.value)}"` : '';
            const minH    = hasData ? 'style="height:0"' : 'style="height:3px"';
            return `<div class="bar-item"><div class="bar-inner ${cls}" data-h="${pct.toFixed(1)}" ${minH} ${tip}></div></div>`;
        }).join('');

        const labelsHTML = bars.map((b, i) =>
            `<div class="bar-lbl">${shouldShowLabel(i, bars.length) ? (b.short || b.label) : ''}</div>`
        ).join('');

        const scoreOverlay = buildScoreOverlayHTML(bars);
        document.getElementById('scoreLegend').classList.toggle('visible', bars.some(b => b.score != null));

        content.innerHTML = `
            <div class="chart-bars-area">
                <div class="chart-grid">
                    <div class="chart-grid-line"></div>
                    <div class="chart-grid-line"></div>
                    <div class="chart-grid-line"></div>
                    <div class="chart-grid-line"></div>
                </div>
                <div class="chart-bars" id="chartBarsRow">${barsHTML}</div>
                ${scoreOverlay}
            </div>
            <div class="chart-x-labels">${labelsHTML}</div>`;

        requestAnimationFrame(() => requestAnimationFrame(() => {
            content.querySelectorAll('.bar-inner[data-h]').forEach(el => {
                el.style.height = el.getAttribute('data-h') + '%';
            });
        }));
    }

    async function render() {
        const all      = (await SAT_STORAGE.getSessions()).sort((a, b) => new Date(b.date) - new Date(a.date));
        const filtered = filterSessions(all, currentFilter);
        const totalSec = filtered.reduce((acc, s) => acc + s.duration, 0);

        const { value, unit } = fmtTotalTime(totalSec);
        document.getElementById('totalValue').textContent = value;
        document.getElementById('totalUnit').textContent  = unit;
        document.getElementById('totalSessionsCount').textContent =
            filtered.length === 1 ? '1 session' : `${filtered.length} sessions`;

        if (filtered.length > 0) {
            const longest = filtered.reduce((b, s) => s.duration > b.duration ? s : b);
            const { value: lv, unit: lu } = fmtTotalTime(longest.duration);
            document.getElementById('longestValue').textContent = lv;
            document.getElementById('longestUnit').textContent  = lu;
            document.getElementById('longestDate').textContent  = fmtDate(longest.date).date;
        } else {
            document.getElementById('longestValue').textContent = '—';
            document.getElementById('longestUnit').textContent  = '';
            document.getElementById('longestDate').textContent  = '';
        }

        renderChart(all, currentFilter);

        const listEl = document.getElementById('sessionList');
        if (filtered.length === 0) {
            const msg = currentFilter === 'day'    ? 'No sessions logged today'
                      : currentFilter === 'week'   ? 'No sessions this week'
                      : currentFilter === 'month'  ? 'No sessions this month'
                      : currentFilter === 'custom' ? 'No sessions in this date range'
                      : 'No sessions yet';
            listEl.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                        </svg>
                    </div>
                    <p class="empty-title">${msg}</p>
                    <p class="empty-sub">Head back to log a session.</p>
                    <a href="log.html" class="btn-go">Log a session</a>
                </div>`;
            return;
        }

        let html = `
            <div class="session-list-header">
                <span class="list-col-label">Date</span>
                <span class="list-col-label right">Duration</span>
                <span></span>
            </div>`;

        filtered.forEach(s => {
            const { date, time } = fmtDate(s.date);
            html += `
                <div class="session-row" id="row-${s.id}">
                    <div>
                        <div class="session-date">${date}</div>
                        <div class="session-time">Started at ${time}</div>
                    </div>
                    <div>
                        <div class="session-duration">${fmtDuration(s.duration)}</div>
                        <div class="session-duration-sub">${fmtDurationShort(s.duration)}</div>
                        ${s.score != null ? `<div class="session-score-sub">${s.score}/10</div>` : ''}
                    </div>
                    <button class="delete-btn" onclick="deleteSession('${s.id}')" title="Delete">
                        <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                            <line x1="1" y1="1" x2="11" y2="11"/><line x1="11" y1="1" x2="1" y2="11"/>
                        </svg>
                    </button>
                </div>`;
        });

        listEl.innerHTML = html;
    }

    function setFilter(f) {
        currentFilter = f;
        document.querySelectorAll('.filter-btn').forEach(btn =>
            btn.classList.toggle('active', btn.dataset.filter === f));
        document.getElementById('dateRangeBar').classList.toggle('visible', f === 'custom');
        render();
    }

    async function deleteSession(id) {
        if (!confirm('Remove this session from your history?')) return;
        const sessions = (await SAT_STORAGE.getSessions()).filter(s => s.id !== id);
        await SAT_STORAGE.saveSessions(sessions);
        render();
        showToast('Session removed');
    }

    let toastTimer = null;
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    document.addEventListener('DOMContentLoaded', () => render());
    window.addEventListener('sat:synced', () => render());
</script>
</body>
</html>
