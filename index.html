<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAT Prep — Log Session</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Libre+Baskerville:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --white:     #ffffff;
            --off-white: #f5f5f5;
            --gray:      #d0d0d0;
            --gray-mid:  #9a9a9a;
            --gray-text: #6b6b6b;
            --dark:      #1e1e1e;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scrollbar-width: none; -ms-overflow-style: none; }
        html::-webkit-scrollbar { display: none; }
        img { max-width: 100%; height: auto; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--white);
            color: var(--dark);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Nav ── */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
            padding: 0.875rem max(5vw, 2.5rem);
            border-bottom: 1px solid var(--gray);
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 100;
        }
        .brand {
            font-size: 0.8125rem;
            font-weight: 600;
            letter-spacing: -0.06em;
            color: var(--dark);
            flex-shrink: 0;
            white-space: nowrap;
        }
        .nav-pills {
            display: flex;
            align-items: center;
            background: var(--off-white);
            border-radius: 6.25rem;
            padding: 0.1875rem;
            gap: 0.125rem;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .nav-pills::-webkit-scrollbar { display: none; }
        .nav-pill {
            font-family: 'Inter', sans-serif;
            font-size: 0.8125rem;
            font-weight: 500;
            letter-spacing: -0.03em;
            padding: 0.4375rem 0.9375rem;
            border-radius: 6.25rem;
            color: var(--gray-text);
            text-decoration: none;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
            line-height: 1;
            flex-shrink: 0;
        }
        .nav-pill:hover:not(.active) { background: rgba(30, 30, 30, 0.06); color: var(--dark); }
        .nav-pill.active { background: var(--dark); color: var(--white); }

        /* ── Page ── */
        .page {
            max-width: 40rem;
            margin: 0 auto;
            padding: clamp(3rem, 6vw, 4.5rem) max(5vw, 2.5rem) clamp(4rem, 8vw, 6rem);
        }
        .page-eyebrow {
            font-family: 'Libre Baskerville', serif;
            font-style: italic;
            font-size: 0.875rem;
            color: var(--gray-text);
            margin-bottom: 0.625rem;
        }
        .page-title {
            font-size: clamp(1.75rem, 5vw, 2.5rem);
            font-weight: 500;
            letter-spacing: -0.06em;
            line-height: 1.08;
            color: var(--dark);
            margin-bottom: 3.5rem;
        }

        /* ── Form ── */
        .form-section { display: flex; flex-direction: column; gap: 2rem; }
        .field         { display: flex; flex-direction: column; gap: 0.5rem; }
        .field-label {
            font-size: 0.6875rem;
            font-weight: 500;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: var(--gray-text);
        }

        .date-time-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        input[type="date"],
        input[type="time"] {
            font-family: 'Inter', sans-serif;
            font-size: clamp(0.9375rem, 2.5vw, 1.125rem);
            font-weight: 400;
            letter-spacing: -0.03em;
            color: var(--dark);
            background: var(--off-white);
            border: 1.5px solid transparent;
            border-radius: 0.75rem;
            padding: 1rem 1.25rem;
            outline: none;
            width: 100%;
            cursor: pointer;
            transition: border-color 0.15s;
            appearance: none;
            -webkit-appearance: none;
        }
        input[type="date"]:focus,
        input[type="time"]:focus { border-color: var(--dark); background: var(--white); }
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator { opacity: 0.4; cursor: pointer; }

        .duration-row  { display: flex; align-items: center; gap: 0.75rem; }
        .duration-unit { display: flex; align-items: center; gap: 0.5rem; flex: 1; }

        .duration-input {
            font-family: 'Inter', sans-serif;
            font-size: clamp(1.75rem, 5vw, 2.5rem);
            font-weight: 300;
            letter-spacing: -0.06em;
            color: var(--dark);
            background: var(--off-white);
            border: 1.5px solid transparent;
            border-radius: 0.75rem;
            padding: 1rem 1.25rem;
            width: 100%;
            outline: none;
            text-align: center;
            transition: border-color 0.15s;
            -moz-appearance: textfield;
            appearance: textfield;
        }
        .duration-input::-webkit-inner-spin-button,
        .duration-input::-webkit-outer-spin-button { display: none; }
        .duration-input:focus { border-color: var(--dark); background: var(--white); }

        .duration-sep {
            font-size: clamp(1.5rem, 4vw, 2.25rem);
            font-weight: 300;
            letter-spacing: -0.06em;
            color: var(--gray);
            flex-shrink: 0;
        }
        .unit-label {
            font-size: 0.8125rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            color: var(--gray-text);
            flex-shrink: 0;
            min-width: 1.75rem;
        }

        .chips { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.25rem; }
        .chip {
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: -0.01em;
            padding: 0.4375rem 0.875rem;
            border-radius: 6.25rem;
            border: 1.5px solid var(--gray);
            background: var(--white);
            color: var(--dark);
            cursor: pointer;
            transition: background 0.12s, border-color 0.12s, color 0.12s;
            min-height: 2.75rem;
            display: inline-flex;
            align-items: center;
        }
        .chip:hover { background: var(--dark); border-color: var(--dark); color: var(--white); }

        .btn-submit {
            font-family: 'Inter', sans-serif;
            font-size: 0.9375rem;
            font-weight: 500;
            letter-spacing: -0.03em;
            padding: 1.0625rem 2.25rem;
            border-radius: 1rem;
            border: none;
            background: var(--dark);
            color: var(--white);
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            align-self: flex-start;
            margin-top: 0.5rem;
            min-height: 2.75rem;
        }
        .btn-submit:hover  { opacity: 0.8; }
        .btn-submit:active { transform: scale(0.97); }

        /* ── Divider ── */
        .divider { border: none; border-top: 1px solid var(--gray); margin: 3.5rem 0 2.5rem; }

        /* ── Recent sessions ── */
        .recent-label {
            font-family: 'Libre Baskerville', serif;
            font-style: italic;
            font-size: 0.875rem;
            color: var(--gray-text);
            margin-bottom: 1.25rem;
        }
        .recent-list { display: flex; flex-direction: column; }
        .recent-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid var(--off-white);
        }
        .recent-row:last-child { border-bottom: none; }
        .recent-date {
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: -0.03em;
            color: var(--dark);
        }
        .recent-time {
            font-family: 'Libre Baskerville', serif;
            font-style: italic;
            font-size: 0.75rem;
            color: var(--gray-text);
            margin-top: 0.125rem;
        }
        .recent-duration {
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: -0.03em;
            color: var(--dark);
        }

        .see-all {
            display: inline-block;
            margin-top: 1.5rem;
            font-size: 0.8125rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            color: var(--dark);
            text-decoration: none;
            opacity: 0.5;
            transition: opacity 0.15s;
        }
        .see-all:hover { opacity: 1; }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(1rem);
            background: var(--dark);
            color: var(--white);
            font-size: 0.8125rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            padding: 0.875rem 1.625rem;
            border-radius: 6.25rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s, transform 0.25s;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── Score input ── */
        .score-row { display: flex; align-items: center; gap: 0.625rem; }
        .score-input {
            font-family: 'Inter', sans-serif;
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 300;
            letter-spacing: -0.06em;
            color: var(--dark);
            background: var(--off-white);
            border: 1.5px solid transparent;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            width: 5.375rem;
            outline: none;
            text-align: center;
            transition: border-color 0.15s;
            -moz-appearance: textfield;
            appearance: textfield;
        }
        .score-input::-webkit-inner-spin-button,
        .score-input::-webkit-outer-spin-button { display: none; }
        .score-input:focus { border-color: var(--dark); background: var(--white); }
        .score-max {
            font-size: 0.875rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            color: var(--gray);
        }
        .score-hint {
            font-family: 'Libre Baskerville', serif;
            font-style: italic;
            font-size: 0.75rem;
            color: var(--gray-text);
            margin-top: 0.375rem;
        }
        .recent-score {
            font-size: 0.6875rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: #4A8C6E;
            margin-left: 0.5rem;
        }

        /* ── Micro-Mobile (≤320px) ── */
        @media (max-width: 320px) {
            nav { padding: 0.375rem 0.5rem; gap: 0.5rem; }
            .brand { display: none; }
            .nav-pills { padding: 2px; }
            .nav-pill {
                font-size: 0.625rem;
                padding: 0.375rem 0.5rem;
                min-height: 2.75rem;
                display: inline-flex;
                align-items: center;
            }
            .page { padding: 1.5rem 0.5rem 3rem; }
            .page-title { font-size: 1.375rem; margin-bottom: 1.5rem; }
            .form-section { gap: 1.25rem; }
            .date-time-row { grid-template-columns: 1fr; }
            input[type="date"],
            input[type="time"] { font-size: 0.875rem; padding: 0.75rem; }
            .duration-row { gap: 0.375rem; }
            .duration-input { font-size: 1.5rem; padding: 0.75rem 0.5rem; }
            .duration-sep { font-size: 1.25rem; }
            .chips { gap: 0.375rem; }
            .chip { font-size: 0.6875rem; padding: 0.375rem 0.625rem; }
            .btn-submit { width: 100%; display: flex; align-items: center; justify-content: center; }
            .score-input { font-size: 1.375rem; padding: 0.625rem 0.5rem; width: 4.5rem; }
            .divider { margin: 2rem 0 1.5rem; }
        }

        /* ── Tablet / iPad Pro (768px–1024px) ── */
        @media (min-width: 768px) and (max-width: 1024px) {
            nav { padding: 0.875rem 3rem; }
            .page { max-width: 36rem; padding: 3rem 3rem 5rem; }
        }

        /* ── Desktop (≥1025px) ── */
        @media (min-width: 1025px) {
            .page { max-width: 40rem; padding: clamp(3rem, 5vw, 4.5rem) max(5vw, 3rem) clamp(4rem, 6vw, 6rem); }
        }
    </style>
</head>
<body>

<nav>
    <span class="brand">SAT Prep</span>
    <div class="nav-pills">
        <a href="home.html"         class="nav-pill">Home</a>
        <a href="index.html"        class="nav-pill active">Log Session</a>
        <a href="test.html"         class="nav-pill">Practice Tests</a>
        <a href="test-history.html" class="nav-pill">Test History</a>
        <a href="history.html"      class="nav-pill">Study History</a>
        <a href="sync.html"         class="nav-pill">Sync</a>
    </div>
</nav>

<div class="page">
    <p class="page-eyebrow">Log a session</p>
    <h1 class="page-title">How long did<br>you study?</h1>

    <div class="form-section">
        <!-- Date + Time Started -->
        <div class="date-time-row">
            <div class="field">
                <span class="field-label">Date</span>
                <input type="date" id="dateInput">
            </div>
            <div class="field">
                <span class="field-label">Time Started</span>
                <input type="time" id="startTimeInput">
            </div>
        </div>

        <!-- Duration -->
        <div class="field">
            <span class="field-label">Duration</span>
            <div class="duration-row">
                <div class="duration-unit">
                    <input type="number" class="duration-input" id="hoursInput"
                           min="0" max="23" placeholder="0">
                    <span class="unit-label">hr</span>
                </div>
                <span class="duration-sep">:</span>
                <div class="duration-unit">
                    <input type="number" class="duration-input" id="minutesInput"
                           min="0" max="59" placeholder="00">
                    <span class="unit-label">min</span>
                </div>
            </div>
            <div class="chips">
                <button class="chip" onclick="addMinutes(15)">+15 min</button>
                <button class="chip" onclick="addMinutes(30)">+30 min</button>
                <button class="chip" onclick="addMinutes(45)">+45 min</button>
                <button class="chip" onclick="addMinutes(60)">+1 hr</button>
                <button class="chip" onclick="addMinutes(90)">+1.5 hr</button>
                <button class="chip" onclick="addMinutes(120)">+2 hr</button>
            </div>
        </div>

        <!-- Session score -->
        <div class="field">
            <span class="field-label">Session score <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--gray-text)">(optional)</span></span>
            <div class="score-row">
                <input type="number" class="score-input" id="scoreInput" min="1" max="10" placeholder="—">
                <span class="score-max">/ 10</span>
            </div>
            <p class="score-hint">Rate your focus, pace, and energy.</p>
        </div>

        <button class="btn-submit" onclick="logSession()">Log Session</button>
    </div>

    <hr class="divider">

    <p class="recent-label">Recent sessions</p>
    <div class="recent-list" id="recentList"></div>
    <a href="history.html" class="see-all" id="seeAllLink" style="display:none;">See all →</a>
</div>

<div class="toast" id="toast"></div>

<script src="storage.js"></script>
<script>
    const RECENT_MAX = 3;

    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

    /* ── Formatting ── */
    function fmtDuration(secs) {
        const h = Math.floor(secs / 3600), m = Math.floor((secs % 3600) / 60);
        if (h > 0 && m > 0) return `${h} hr ${m} min`;
        if (h > 0)           return `${h} hr`;
        return `${m} min`;
    }
    function fmtDate(isoStr) {
        const d = new Date(isoStr);
        return `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}`;
    }
    function fmtTime(isoStr) {
        const d = new Date(isoStr);
        const h = d.getHours(), min = String(d.getMinutes()).padStart(2,'0');
        return `${(h % 12) || 12}:${min} ${h >= 12 ? 'PM' : 'AM'}`;
    }
    function todayValue() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    /* ── Quick-add chips ── */
    function addMinutes(n) {
        const h = parseInt(document.getElementById('hoursInput').value)   || 0;
        const m = parseInt(document.getElementById('minutesInput').value) || 0;
        let total = Math.max(0, h * 60 + m + n);
        document.getElementById('hoursInput').value   = Math.floor(total / 60);
        document.getElementById('minutesInput').value = total % 60;
        updateStartTime();
    }

    /* ── Auto-calculate start time from duration ── */
    function updateStartTime() {
        const h = parseInt(document.getElementById('hoursInput').value)   || 0;
        const m = parseInt(document.getElementById('minutesInput').value) || 0;
        const totalMins = h * 60 + m;
        if (totalMins <= 0) return;

        const start = new Date(Date.now() - totalMins * 60000);
        document.getElementById('startTimeInput').value =
            `${String(start.getHours()).padStart(2,'0')}:${String(start.getMinutes()).padStart(2,'0')}`;
        document.getElementById('dateInput').value =
            `${start.getFullYear()}-${String(start.getMonth()+1).padStart(2,'0')}-${String(start.getDate()).padStart(2,'0')}`;
    }

    /* ── Log session ── */
    async function logSession() {
        const dateVal      = document.getElementById('dateInput').value;
        const startTimeVal = document.getElementById('startTimeInput').value;
        const h            = parseInt(document.getElementById('hoursInput').value)   || 0;
        const m            = parseInt(document.getElementById('minutesInput').value) || 0;
        const duration     = h * 3600 + m * 60;

        if (!dateVal)      { showToast('Pick a date first'); return; }
        if (duration <= 0) { showToast('Add a duration first'); return; }

        const [yr, mo, dy]    = dateVal.split('-').map(Number);
        const now             = new Date();
        const [startHr, startMin] = startTimeVal
            ? startTimeVal.split(':').map(Number)
            : [now.getHours(), now.getMinutes()];
        const date = new Date(yr, mo - 1, dy, startHr, startMin, 0);

        const scoreRaw = parseFloat(document.getElementById('scoreInput').value);
        const score    = (!isNaN(scoreRaw) && scoreRaw >= 1 && scoreRaw <= 10) ? +scoreRaw.toFixed(1) : null;

        const sessions = await SAT_STORAGE.getSessions();
        sessions.push({ id: Date.now().toString(), date: date.toISOString(), duration, score });
        await SAT_STORAGE.saveSessions(sessions);

        document.getElementById('hoursInput').value   = '';
        document.getElementById('minutesInput').value = '';
        document.getElementById('scoreInput').value   = '';

        await renderRecent();
        showToast(`Session logged — ${fmtDuration(duration)}`);
    }

    /* ── Recent list ── */
    async function renderRecent() {
        const sessions = (await SAT_STORAGE.getSessions())
            .sort((a, b) => new Date(b.date) - new Date(a.date));

        const listEl = document.getElementById('recentList');
        const linkEl = document.getElementById('seeAllLink');

        if (sessions.length === 0) {
            listEl.innerHTML = '';
            linkEl.style.display = 'none';
            return;
        }

        listEl.innerHTML = sessions.slice(0, RECENT_MAX).map(s => {
            const scoreStr = s.score != null ? `<span class="recent-score">${s.score}/10</span>` : '';
            return `
            <div class="recent-row">
                <div>
                    <div class="recent-date">${fmtDate(s.date)}${scoreStr}</div>
                    <div class="recent-time">Started at ${fmtTime(s.date)}</div>
                </div>
                <div class="recent-duration">${fmtDuration(s.duration)}</div>
            </div>`;
        }).join('');

        linkEl.style.display = sessions.length > RECENT_MAX ? 'inline-block' : 'none';
    }

    /* ── Toast ── */
    let toastTimer = null;
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    /* ── Boot ── */
    document.addEventListener('DOMContentLoaded', async () => {
        document.getElementById('dateInput').value = todayValue();
        const now = new Date();
        document.getElementById('startTimeInput').value =
            `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

        document.getElementById('minutesInput').addEventListener('blur', function () {
            let v = parseInt(this.value) || 0;
            if (v > 59) {
                document.getElementById('hoursInput').value =
                    (parseInt(document.getElementById('hoursInput').value) || 0) + Math.floor(v / 60);
                this.value = v % 60;
            }
            updateStartTime();
        });

        document.getElementById('hoursInput').addEventListener('input', updateStartTime);
        document.getElementById('minutesInput').addEventListener('input', updateStartTime);

        await renderRecent();
    });
</script>
</body>
</html>
